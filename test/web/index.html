<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noolara Ping Tester</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --ok: #10b981;
      --err: #ef4444;
      --border: #334155;
      --btn: #1d4ed8;
      --btn-hover: #1e40af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #1e293b 0%, var(--bg) 50%, #020617 100%);
      color: var(--text);
    }

    .card {
      width: min(820px, 100%);
      background: linear-gradient(180deg, #111827, #0b1220);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3.5vw, 2rem);
      letter-spacing: 0.3px;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      background: var(--btn);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms ease;
    }

    button:hover { background: var(--btn-hover); }

    pre {
      margin-top: 16px;
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      min-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ok { color: var(--ok); }
    .err { color: var(--err); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Noolara API Ping Tester</h1>
    <p>Use these buttons to test API endpoints from the same server origin.</p>

    <section class="row">
      <button data-endpoint="/api/ping">Ping</button>
      <button data-endpoint="/api/mongo-ping">Mongo Ping</button>
      <button data-endpoint="/ra">RA Route</button>
    </section>

    <pre id="output">Ready.</pre>
  </main>

  <script>
    const output = document.getElementById("output");

    async function hit(endpoint) {
      output.textContent = "Requesting " + endpoint + " ...";
      output.className = "";

      try {
        const startedAt = performance.now();
        const res = await fetch(endpoint);
        const elapsed = Math.round(performance.now() - startedAt);
        const raw = await res.text();

        let parsed;
        try {
          parsed = JSON.parse(raw);
        } catch (_) {
          parsed = raw;
        }

        output.className = res.ok ? "ok" : "err";
        output.textContent = JSON.stringify(
          {
            endpoint,
            status: res.status,
            ok: res.ok,
            elapsed_ms: elapsed,
            body: parsed
          },
          null,
          2
        );
      } catch (err) {
        output.className = "err";
        output.textContent = "Network error: " + err;
      }
    }

    document.querySelectorAll("button[data-endpoint]").forEach((btn) => {
      btn.addEventListener("click", () => hit(btn.dataset.endpoint));
    });
  </script>
</body>
</html>
